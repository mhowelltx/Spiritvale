services:
  db:
    image: postgres:16
    container_name: spiritvale-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spiritvale
    ports:
      - "5432:5432"
    volumes:
      - spiritvale-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spiritvale"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  spiritvale-postgres-data:
